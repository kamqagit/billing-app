function App(){
  const[cat,setCat]=useState("all");
  const[cart,setCart]=useState({});
  const[custName,setCustName]=useState("");
  const[custPhone,setCustPhone]=useState("");
  const[custAddr,setCustAddr]=useState("");
  const[orderType,setOrderType]=useState("Takeaway");
  const[notes,setNotes]=useState("");
  const[discVal,setDiscVal]=useState(0);
  const[discType,setDiscType]=useState("percent");
  const[qrImage,setQrImage]=useState(QR_BASE64);
  const[showBill,setShowBill]=useState(false);
  const[toast,setToast]=useState(null);
  const qrRef=useRef();
  const billRef=useRef();

  const handleSaveImage=async()=>{
    const node=billRef.current;
    if(!node){showToast("Bill not ready");return;}
    showToast("Generating image...");
    try{
      const canvas=await html2canvas(node,{scale:2,useCORS:true,backgroundColor:"#ffffff",logging:false,allowTaint:true});
      const imgData=canvas.toDataURL("image/png");
      const link=document.createElement("a");
      link.href=imgData;
      link.download="bill-"+(custName||"customer").replace(/\s+/g,"-")+".png";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      showToast("✅ Saved! Share on WhatsApp");
    }catch(e){
      console.error(e);
      showToast("Try Print Bill instead");
    }
  };

  const filtered=cat==="all"?MENU:MENU.filter(i=>i.cat===cat);
  const cartItems=MENU.filter(i=>cart[i.id]>0);
  const totalQty=cartItems.reduce((s,i)=>s+cart[i.id],0);
  const subtotal=cartItems.reduce((s,i)=>s+i.price*cart[i.id],0);
  const discAmt=discType==="percent"?Math.round(subtotal*discVal/100):Math.min(Number(discVal),subtotal);
  const grand=subtotal-discAmt;

  const now=new Date();
  const dateStr=now.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
  const timeStr=now.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});

  const showToast=useCallback((msg)=>{
    setToast(msg);
    setTimeout(()=>setToast(null),2200);
  },[]);

  const add=(id)=>{
    setCart(c=>({...c,[id]:(c[id]||0)+1}));
    showToast(MENU.find(i=>i.id===id).name+" added");
  };

  const setQty=(id,qty)=>{
    setCart(c=>{const n={...c};if(qty<=0)delete n[id];else n[id]=qty;return n;});
  };

  const clearCart=()=>{
    if(window.confirm("Clear all items?"))setCart({});
  };

  const handleQr=(file)=>{
    if(!file)return;
    if(!file.type.startsWith("image/")){showToast("Upload an image file");return;}
    const r=new FileReader();
    r.onload=e=>{setQrImage(e.target.result);showToast("QR uploaded!");};
    r.readAsDataURL(file);
  };

  const openBill=()=>{
    if(cartItems.length===0){showToast("Add items first!");return;}
    if(!custName.trim()){showToast("Enter customer name!");return;}
    setShowBill(true);
  };

  const handleWhatsApp=()=>{
    const phone=custPhone.replace(/\D/g,"");
    let msg="🍛 *अWADHI ज़AIKA*\n_The Royal Flavors of Awadh_ | 📞 *8700861121*\n\n";
    msg+="*Date:* "+dateStr+"\n\n";
    msg+="Dear *"+(custName||"Customer")+"*, thank you for your order! 🙏\n\n";
    msg+="*"+orderType.toUpperCase()+" ORDER*\n━━━━━━━━━━━━━━━\n";
    cartItems.forEach(i=>{
      msg+="• "+i.name+(i.sub?" ("+i.sub+")":"")+" × "+cart[i.id]+" = ₹"+(i.price*cart[i.id])+"\n";
    });
    msg+="━━━━━━━━━━━━━━━\n";
    if(discAmt>0)msg+="Discount: -₹"+discAmt+"\n";
    msg+="*Total: ₹"+grand+"*\n";
    if(notes)msg+="\n📝 "+notes+"\n";
    msg+="\n💳 Scan QR to Pay via PhonePe\nShare payment screenshot ✅\n\n";
    msg+="_हर खाने में अवध की खुशबू_ 🌟";
    const url=phone?"https://wa.me/91"+phone+"?text="+encodeURIComponent(msg):"https://wa.me/?text="+encodeURIComponent(msg);
    window.open(url,"_blank");
  };

  const handlePrint=()=>{
    if(cartItems.length===0){showToast("Add items first!");return;}
    if(!custName.trim()){showToast("Enter customer name!");return;}
    
    const qrBlock=qrImage?('<div style="text-align:center;margin-top:10px"><img src="'+qrImage+'" style="width:200px;height:200px;object-fit:contain;border-radius:8px"/></div>'):'';
    const discRow=discAmt>0?('<div class="row"><span>Discount</span><span style="color:#4CAF87">-₹'+discAmt+'</span></div>'):'';
    
    let itemRows='';
    cartItems.forEach(i=>{
      const itemName=i.name+(i.sub?' ('+i.sub+')':'');
      itemRows+='<tr><td>'+itemName+'</td><td>'+cart[i.id]+'</td><td style="text-align:right">₹'+i.price+'</td><td>₹'+(i.price*cart[i.id])+'</td></tr>';
    });
    
    const pw=window.open("","_blank");
    if(!pw){showToast("Allow popups to print");return;}
    
    pw.document.write('<!DOCTYPE html><html><head><title>Bill – '+custName+'</title>'+
    '<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600&family=Inter:wght@600;700&display=swap" rel="stylesheet">'+
    '<style>'+
      'body{margin:0;padding:24px;font-family:"DM Sans",sans-serif;color:#111;background:#fff;max-width:400px;margin:0 auto}'+
      '.brand{text-align:center;border-bottom:2px solid #C9A000;padding-bottom:14px;margin-bottom:14px}'+
      '.brand img{width:240px;height:auto;margin-bottom:8px}'+
      '.brand-phone{font-size:18px;font-weight:700;color:#C9A000;font-family:"Inter",sans-serif;letter-spacing:0.03em;margin-top:8px}'+
      '.meta{text-align:right;font-size:11px;color:#aaa;margin-bottom:12px}'+
      '.cust{background:#f9f6ee;border-radius:7px;padding:10px 12px;font-size:12px;margin-bottom:14px;line-height:1.75}'+
      '.cust strong{font-size:14px;display:block;margin-bottom:2px}'+
      'table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px}'+

      '.footer .reorder{font-size:12px;color:#C9A000;font-weight:600;margin-top:6px}'+
    '</style></head><body>'+
    '<div class="brand">'+
      '<img src="'+LOGO_BASE64+'" alt="अWADHI ज़AIKA"/>'+
      '<div class="brand-phone">📞 8700861121</div>'+
    '</div>'+
    '<div class="meta">'+dateStr+', '+timeStr+'</div>'+
    '<div class="cust">'+
      '<strong>'+custName+'</strong>'+
      (custPhone?'📞 '+custPhone+'<br/>':'')+

    '</div>'+
    '<table>'+
      '<thead><tr><th>Item</th><th>Qty</th><th style="text-align:right">Rate</th><th style="text-align:right">Amt</th></tr></thead>'+
      '<tbody>'+itemRows+'</tbody>'+
    '</table>'+
    '<div class="tots">'+
      discRow+
      '<div class="grand"><span>Total</span><span>₹'+grand+'</span></div>'+
    '</div>'+
    (notes?'<div style="margin-top:12px;font-size:11px;color:#888;border-top:1px solid #eee;padding-top:10px"><b>Note:</b> '+notes+'</div>':'')+
    '<div class="pay">'+
      '<div class="pay-lbl">Scan QR to Pay via PhonePe</div>'+
      qrBlock+
      '<div class="pay-note">Share payment screenshot after paying ✅</div>'+
    '</div>'+
    '<div class="footer">'+
      '<div class="hindi">शुक्रिया! 🙏</div>'+
      '<div class="tagline">हर खाने में अवध की खुशबू</div>'+
      '<div class="reorder">📞 8700861121 — Reorder करने के लिए कॉल करें</div>'+
    '</div>'+
    '<script>window.onload=()=>window.print();<\/script>'+
    '</body></html>');
    pw.document.close();
  };

  const INP={background:"#161616",border:"1px solid rgba(245,197,24,.18)",borderRadius:8,padding:"9px 12px",color:"#F5F0E8",fontSize:13,outline:"none",width:"100%"};

  return(

      <div style={{flex:1,overflowY:"auto",padding:"24px 28px",borderRight:"1px solid rgba(245,197,24,.12)"}}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:28,gap:10}}>
          <img src={LOGO_BASE64} alt="अWADHI ज़AIKA" style={{width:280,height:"auto"}}/>
          <div style={{fontSize:10,color:"#555",letterSpacing:".15em",textTransform:"uppercase"}}>Cloud Kitchen · Billing System</div>
        </div>
        <SecTitle>Payment QR Code</SecTitle>
        {qrImage?(
          <div style={{display:"flex",alignItems:"center",gap:12,background:"rgba(245,197,24,.05)",border:"1px solid rgba(245,197,24,.2)",borderRadius:10,padding:"10px 14px",marginBottom:22}}>
            <img src={qrImage} alt="QR" style={{width:54,height:54,objectFit:"contain",borderRadius:6,border:"1px solid rgba(245,197,24,.3)"}}/>
            <div style={{flex:1}}>
              <div style={{fontSize:12,color:"#F5F0E8",fontWeight:600}}>QR Code ready ✓</div>
              <div style={{fontSize:10,color:"#555",marginTop:2}}>Shows on bills & prints</div>
            </div>
            <button onClick={()=>setQrImage(null)} style={{background:"rgba(224,92,92,.14)",border:"1px solid rgba(224,92,92,.3)",borderRadius:7,padding:"5px 11px",color:"#E05C5C",fontSize:11,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Change</button>
          </div>
        ):(
          <div className="qr-drop" onClick={()=>qrRef.current.click()} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();handleQr(e.dataTransfer.files[0]);}}

            <div style={{fontSize:26}}>📷</div>
            <div style={{fontSize:12,color:GOLD,fontWeight:600}}>Upload QR Code Image</div>
            <div style={{fontSize:10,color:"#555"}}>Click or drag & drop · PNG, JPG</div>
            <input ref={qrRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handleQr(e.target.files[0])}/>
          </div>
        )}
        <SecTitle>Customer Details</SecTitle>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
          <div style={{display:"flex",flexDirection:"column",gap:5,gridColumn:"1/-1"}}>
            <label style={{fontSize:10,color:"#777"}}>Customer Name *</label>
            <input style={INP} value={custName} onChange={e=>setCustName(e.target.value)} placeholder="e.g. Rahul Sharma"/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            <label style={{fontSize:10,color:"#777"}}>Phone Number</label>
            <input style={INP} value={custPhone} onChange={e=>setCustPhone(e.target.value)} placeholder="+91 98765 43210"/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            <label style={{fontSize:10,color:"#777"}}>Order Type</label>
            <select style={INP} value={orderType} onChange={e=>setOrderType(e.target.value)}>
              <option value="Takeaway">📦 Takeaway</option>
              <option value="Delivery">🚴 Delivery</option>
            </select>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:5,gridColumn:"1/-1"}}>
            <label style={{fontSize:10,color:"#777"}}>{orderType==="Delivery"?"Delivery Address":"Pickup Note"}</label>
            <input style={INP} value={custAddr} onChange={e=>setCustAddr(e.target.value)} placeholder={orderType==="Delivery"?"Full delivery address":"e.g. Ready in 15 mins"}/>
          </div>
        </div>
        <SecTitle>Menu</SecTitle>
        <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:16}}>
          {CATS.map(c=>(
            <button key={c.key} className="tab-btn" onClick={()=>setCat(c.key)}
              style={{padding:"6px 14px",borderRadius:20,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",border:"1px solid "+(cat===c.key?GOLD:"rgba(245,197,24,.18)"),background:cat===c.key?GOLD:"transparent",color:cat===c.key?"#0a0a0a":"#888",fontSize:12,fontWeight:cat===c.key?600:400,transition:"all .18s"}}>
              {c.label}
            </button>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:10,marginBottom:28}}>
          {filtered.map(item=>(
            <div key={item.id} className="menu-card"
              style={{background:cart[item.id]?"rgba(245,197,24,.07)":"#161616",border:"1px solid "+(cart[item.id]?GOLD:"rgba(245,197,24,.14)"),borderRadius:12,padding:"12px 14px",animation:"fadeUp .22s ease"}}>
              <div style={{display:"flex",alignItems:"center"}}>
                <VegDot veg={item.veg}/>
                <span style={{fontSize:10,color:item.veg?"#4CAF87":"#E05C5C",fontWeight:600}}>{item.veg?"Veg":"Non-Veg"}</span>
              </div>
              <div style={{fontSize:13,fontWeight:600,color:"#F5F0E8",lineHeight:1.3,margin:"6px 0 3px"}}>{item.name}</div>
              {item.sub&&<div style={{fontSize:11,color:"#555",marginBottom:8}}>{item.sub}</div>}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:8}}>
                <span style={{fontFamily:"'Inter',sans-serif",fontSize:17,fontWeight:700,color:GOLD}}>₹{item.price}</span>
                <button onClick={()=>add(item.id)}
                  onMouseEnter={e=>{e.currentTarget.style.transform="scale(1.14)";e.currentTarget.style.background="#FFD966";}}
                  onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)";e.currentTarget.style.background=GOLD;}}
                  style={{width:30,height:30,borderRadius:"50%",background:GOLD,border:"none",color:"#0a0a0a",fontSize:22,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1,transition:"all .18s",fontFamily:"'DM Sans',sans-serif"}}>+</button>
              </div>
            </div>
          ))}
        </div>
        <SecTitle>Order Settings</SecTitle>
        <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:10}}>

        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10}}>
          <span style={{fontSize:10,color:"#777",whiteSpace:"nowrap"}}>Discount:</span>

          <select style={{background:"#161616",border:"1px solid rgba(245,197,24,.2)",borderRadius:7,padding:"6px 10px",color:"#F5F0E8",fontSize:13,outline:"none"}} value={discType} onChange={e=>setDiscType(e.target.value)}>

            <option value="flat">₹ Flat</option>
          </select>
        </div>
        <div style={{height:40}}/>
      </div>
      <div style={{width:400,display:"flex",flexDirection:"column",background:"#111",borderLeft:"1px solid rgba(245,197,24,.1)"}}>

          <span style={{fontFamily:"'Playfair Display',serif",fontSize:17,color:GOLD}}>Current Order</span>

        </div>
        <div style={{flex:1,overflowY:"auto",padding:"12px 22px"}}>
          {cartItems.length===0

                <div style={{fontSize:12}}>No items added yet</div>
              </div>

              <div key={item.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid rgba(245,197,24,.07)"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:500,color:"#F5F0E8",lineHeight:1.3}}>{item.name}</div>
                  {item.sub&&<div style={{fontSize:11,color:"#444",marginTop:1}}>{item.sub}</div>}
                </div>
                <div style={{display:"flex",alignItems:"center",background:"#1a1a1a",border:"1px solid rgba(245,197,24,.18)",borderRadius:8,overflow:"hidden"}}>
                  <button onClick={()=>setQty(item.id,cart[item.id]-1)} style={{width:28,height:28,background:"transparent",border:"none",color:GOLD,fontSize:16,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',sans-serif"}}>−</button>
                  <span style={{minWidth:26,textAlign:"center",fontSize:13,fontWeight:600,fontFamily:"'Inter',sans-serif"}}>{cart[item.id]}</span>
                  <button onClick={()=>setQty(item.id,cart[item.id]+1)} style={{width:28,height:28,background:"transparent",border:"none",color:GOLD,fontSize:16,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',sans-serif"}}>+</button>
                </div>
                <div style={{fontFamily:"'Inter',sans-serif",fontSize:15,color:GOLD,fontWeight:700,minWidth:54,textAlign:"right"}}>₹{item.price*cart[item.id]}</div>

        <div style={{padding:"14px 22px",borderTop:"1px solid rgba(245,197,24,.1)",background:"#161616"}}>

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"#F5F0E8",borderTop:discAmt>0?"1px solid rgba(245,197,24,.14)":"none",marginTop:discAmt>0?8:0,paddingTop:discAmt>0?10:0}}>
            <span>Total</span>
            <span style={{color:GOLD,fontSize:26,fontFamily:"'Inter',sans-serif"}}>₹{grand}</span>

        <div style={{padding:"14px 22px",display:"flex",flexDirection:"column",gap:9,borderTop:"1px solid rgba(245,197,24,.1)"}}>

            onMouseLeave={e=>e.currentTarget.style.background=GOLD}

          <button onClick={handlePrint} style={{padding:"11px",borderRadius:10,border:"1px solid rgba(245,197,24,.25)",background:"transparent",color:GOLD,fontSize:13,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>

          </button>
          <button onClick={clearCart} style={{padding:"9px",borderRadius:10,border:"1px solid rgba(224,92,92,.25)",background:"transparent",color:"#E05C5C",fontSize:12,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
            🗑 Clear Order
          </button>
        </div>
      </div>
      {showBill&&(
        <div onClick={e=>e.target===e.currentTarget&&setShowBill(false)}

          <div style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:460,maxHeight:"92vh",overflow:"hidden",display:"flex",flexDirection:"column",animation:"modalIn .28s ease"}}>
            <div ref={billRef} style={{overflowY:"auto",flex:1,padding:"28px 28px 18px",color:"#111",fontFamily:"'DM Sans',sans-serif"}}>
              <div style={{textAlign:"center",borderBottom:"2px solid #C9A000",paddingBottom:16,marginBottom:14}}>
                <img src={LOGO_BASE64} alt="अWADHI ज़AIKA" style={{width:240,height:"auto",marginBottom:8}}/>
                <div style={{fontSize:18,fontWeight:700,color:"#C9A000",fontFamily:"'Inter',sans-serif",letterSpacing:"0.03em",marginTop:8}}>📞 8700861121</div>

                {custAddr&&<div>📍 {custAddr}</div>}
                <div>🏷 {orderType}</div>
              </div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,marginBottom:14}}>

                  <tr style={{background:"#111"}}>

                    ))}
                  </tr>
                </thead>
                <tbody>
                  {cartItems.map((item,idx)=>(
                    <tr key={item.id} style={{background:idx%2===1?"#f9f6ee":"transparent"}}>
                      <td style={{padding:"7px 8px",borderBottom:"1px solid #eee"}}>{item.name}{item.sub?" ("+item.sub+")":""}</td>
                      <td style={{padding:"7px 8px",borderBottom:"1px solid #eee",fontFamily:"'Inter',sans-serif",fontWeight:600}}>{cart[item.id]}</td>
                      <td style={{padding:"7px 8px",borderBottom:"1px solid #eee",textAlign:"right",fontFamily:"'Inter',sans-serif",fontWeight:600}}>₹{item.price}</td>
                      <td style={{padding:"7px 8px",borderBottom:"1px solid #eee",textAlign:"right",fontWeight:600,fontFamily:"'Inter',sans-serif"}}>₹{item.price*cart[item.id]}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{borderTop:"2px solid #111",paddingTop:10}}>
                {discAmt>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#4CAF87",padding:"3px 0"}}><span>Discount</span><span style={{fontFamily:"'Inter',sans-serif",fontWeight:700}}>-₹{discAmt}</span></div>}
                <div style={{display:"flex",justifyContent:"space-between",fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,marginTop:8,paddingTop:8,borderTop:"1px solid #ddd"}}>
                  <span>Total</span><span style={{color:"#C9A000",fontFamily:"'Inter',sans-serif",fontSize:24}}>₹{grand}</span>
                </div>
              </div>
              {notes&&<div style={{marginTop:12,fontSize:11,color:"#888",borderTop:"1px solid #eee",paddingTop:10}}><b>Note:</b> {notes}</div>}
              <div style={{marginTop:16,background:"#f9f6ee",borderRadius:8,padding:"14px 16px",textAlign:"center"}}>
                <div style={{fontSize:11,letterSpacing:".14em",textTransform:"uppercase",color:"#aaa",marginBottom:8,fontWeight:600}}>Scan QR to Pay via PhonePe</div>

                  <div style={{marginTop:6}}>
                    <img src={qrImage} alt="QR" style={{width:200,height:200,objectFit:"contain",borderRadius:8}}/>
                  </div>
                )}

              </div>
              <div style={{textAlign:"center",marginTop:18,borderTop:"1px solid #eee",paddingTop:12,fontSize:11,color:"#999"}}>
                <div style={{fontSize:14,color:"#C9A000",marginBottom:6,fontWeight:600}}>शुक्रिया! 🙏</div>
                <div style={{fontSize:13,color:"#555",fontWeight:500,marginBottom:4}}>हर खाने में अवध की खुशबू</div>
                <div style={{fontSize:12,color:"#C9A000",fontWeight:600,marginTop:6,fontFamily:"'Inter',sans-serif"}}>📞 8700861121 — Reorder करने के लिए कॉल करें</div>
              </div>
            </div>
            <div style={{padding:"12px 18px",display:"flex",gap:8,borderTop:"1px solid #eee",background:"#fff",flexShrink:0,flexWrap:"wrap"}}>
              <button onClick={handleSaveImage}
                style={{flex:1,minWidth:140,padding:"11px",borderRadius:9,border:"none",background:"#25D366",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:7,fontFamily:"'DM Sans',sans-serif"}}>
                💾 Save Bill as Image
              </button>
              <button onClick={handleWhatsApp}
                style={{flex:1,minWidth:120,padding:"11px",borderRadius:9,border:"1px solid #25D366",background:"transparent",color:"#25D366",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:7,fontFamily:"'DM Sans',sans-serif"}}>
                📋 Text to WhatsApp
              </button>
              <button onClick={()=>setShowBill(false)} style={{padding:"11px 14px",borderRadius:9,border:"1px solid #ddd",background:"transparent",color:"#555",fontSize:13,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>✕</button>
            </div>
          </div>
        </div>

      {toast&&(
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"#1e1e1e",border:"1px solid rgba(245,197,24,.4)",borderRadius:10,padding:"10px 20px",fontSize:13,color:"#F5F0E8",zIndex:9999,animation:"toastIn .3s ease",whiteSpace:"nowrap",pointerEvents:"none"}}>
          ✓ {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</html>
